<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>The Gem I Am</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap");
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        font-family: "Cormorant Garamond", serif;
        color: #000b;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
      }
      body {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 100dvh;
        touch-action: manipulation;
        background:
          radial-gradient(72% 46% at 50% 2%, #fffffffa 0 22%, #ffffff00 68%),
          radial-gradient(58% 50% at -8% 72%, #d8f4ffed 0 18%, #d8f4ff00 72%),
          radial-gradient(55% 48% at 108% 68%, #eadbfff0 0 18%, #eadbff00 74%),
          linear-gradient(155deg, #eef5ff 0%, #b9d2ff 52%, #d9c9f2 100%);
      }
      button,
      input,
      textarea {
        font: inherit;
      }
      button {
        color: inherit;
      }
      .stage {
        position: relative;
        z-index: 2;
        width: min(94vw, calc(94dvh * 9 / 16));
        aspect-ratio: 9/16;
        overflow: visible;
        container-type: inline-size;
        border-radius: 3.2cqw;
        isolation: isolate;
      }
      .stage::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 0;
        border-radius: inherit;
        background: linear-gradient(
          155deg,
          #dceaff99,
          #bfd4ff78 48%,
          #eadfff80
        );
        box-shadow: 0 3cqw 8cqw #0000001f;
        pointer-events: none;
      }
      .top-title,
      .big-title,
      .center-copy,
      .start-cta {
        position: absolute;
        left: 50%;
        z-index: 10;
        text-align: center;
        transition:
          opacity 0.45s ease,
          transform 0.45s ease;
      }
      .top-title {
        top: var(--top-y, 3.2%);
        translate: -50% 0;
        font-size: var(--top-size, 3.1cqw);
        font-weight: 500;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        white-space: nowrap;
      }
      .big-title {
        top: var(--title-y, 12%);
        translate: -50% -50%;
        font-size: var(--title-size, 13.4cqw);
        font-weight: 300;
        line-height: 0.84;
        letter-spacing: -0.055em;
        white-space: nowrap;
        color: #00000070;
        text-shadow:
          0 0.3cqw 1cqw #0004,
          0 0 10cqw #fff6;
      }
      .center-copy {
        bottom: var(--copy-bottom, 2.7%);
        translate: -50% 0;
        width: var(--copy-width, 88%);
        font-size: var(--copy-size, 3.15cqw);
        line-height: var(--copy-line, 1.25);
        color: #0008;
        animation: copyFloat 4.8s ease-in-out infinite;
      }
      @keyframes copyFloat {
        50% {
          translate: -50% -0.35cqw;
        }
      }
      .start-cta {
        bottom: var(--start-bottom, 10.5%);
        translate: -50% 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: var(--start-gap, 2.5cqw);
      }
      .start-btn,
      .pill {
        border: 0;
        border-radius: 999px;
        cursor: pointer;
        background: #ffffff8c;
        border: var(--pill-border, 0.22cqw) solid #ffffff99;
        box-shadow:
          0 2.8cqw 6cqw #00000029,
          inset 0 0.5cqw 1.2cqw #ffffff80;
        transition: 0.3s ease;
      }
      .start-btn {
        position: relative;
        padding: var(--start-pad, 3.2cqw 10cqw);
        font-size: var(--start-size, 4.2cqw);
        font-weight: 500;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        animation: buttonFloat 4s ease-in-out infinite;
      }
      .start-btn::after {
        content: "";
        position: absolute;
        inset: -0.8cqw;
        border: 0.16cqw solid #ffffff66;
        border-radius: inherit;
        animation: pulse 3s ease-in-out infinite;
      }
      .start-btn:active,
      .pill:active {
        scale: 0.97;
      }
      @keyframes buttonFloat {
        50% {
          translate: 0 -1cqw;
        }
      }
      @keyframes pulse {
        50% {
          scale: 1.06;
          opacity: 0.6;
        }
      }
      .start-hint {
        font-size: var(--hint-size, 2.1cqw);
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #0007;
      }
      .card {
        position: absolute;
        left: var(--x);
        top: var(--y);
        z-index: 3;
        width: var(--card-width, 22%);
        aspect-ratio: 0.7;
        overflow: hidden;
        padding: var(--card-pad, 1.5cqw);
        border: var(--card-border, 0.18cqw) solid #ffffff59;
        border-radius: var(--card-radius, 1.5cqw);
        background: #ffffff14;
        box-shadow:
          0 2cqw 5cqw #00000026,
          inset 0 0.6cqw 1.2cqw #ffffff40;
        transform: rotate(var(--r));
        transform-origin: center;
        cursor: pointer;
        transition:
          left 0.62s cubic-bezier(0.22, 1, 0.36, 1),
          top 0.62s cubic-bezier(0.22, 1, 0.36, 1),
          width 0.62s cubic-bezier(0.22, 1, 0.36, 1),
          transform 0.62s cubic-bezier(0.22, 1, 0.36, 1),
          opacity 0.34s ease;
        contain: layout paint style;
      }
      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 1;
        border-radius: inherit;
        background: linear-gradient(
          120deg,
          #ffffff73,
          #ffffff14 30%,
          #ffffff26 60%,
          #ffffff4d
        );
        opacity: 0.6;
        pointer-events: none;
      }
      .card-img {
        position: absolute;
        inset: 0 0 15%;
        width: 100%;
        height: 85%;
        object-fit: cover;
        border-radius: inherit;
      }
      .card-text {
        position: absolute;
        left: var(--card-text-x, 7%);
        bottom: var(--card-text-y, 4%);
        z-index: 2;
        font-size: var(--card-text-size, 2.25cqw);
        line-height: 1.08;
        color: #fff;
      }
      body[data-mode="gathering"] .card,
      body[data-mode="returning"] .card {
        left: 50% !important;
        top: 50% !important;
        width: var(--gather-width, 32%) !important;
        opacity: 1 !important;
        pointer-events: none;
        transform: translate(-50%, -50%) rotate(var(--gather-rot)) !important;
      }
      body[data-mode="gathering"] .top-title,
      body[data-mode="gathering"] .big-title,
      body[data-mode="gathering"] .center-copy,
      body[data-mode="showcase"] .top-title,
      body[data-mode="showcase"] .big-title,
      body[data-mode="showcase"] .center-copy,
      body[data-mode="detail"] .top-title,
      body[data-mode="detail"] .big-title,
      body[data-mode="detail"] .center-copy {
        opacity: 0;
        pointer-events: none;
      }
      body[data-mode="showcase"] .card {
        pointer-events: none;
      }
      .card.show-center,
      .card.show-prev,
      .card.show-next {
        pointer-events: auto !important;
      }
      .card.show-center {
        left: 50% !important;
        top: var(--center-y, 69%) !important;
        z-index: 8 !important;
        width: var(--center-width, 43%) !important;
        transform: translate(-50%, -50%) !important;
      }
      .card.show-prev {
        left: var(--prev-x, -8%) !important;
        top: var(--side-y, 70%) !important;
        z-index: 5 !important;
        width: var(--side-width, 27%) !important;
        opacity: 0.78;
        transform: translateY(-50%) rotate(var(--side-rotate, -7deg)) !important;
      }
      .card.show-next {
        left: var(--next-x, 81%) !important;
        top: var(--side-y, 70%) !important;
        z-index: 5 !important;
        width: 27% !important;
        opacity: 0.78;
        transform: translateY(-50%)
          rotate(calc(0deg - var(--side-rotate, -7deg))) !important;
      }
      .card.show-far {
        left: 50% !important;
        top: var(--side-y, 70%) !important;
        z-index: 1 !important;
        width: var(--side-width, 27%) !important;
        opacity: 0;
        pointer-events: none;
        transform: translate(-50%, -50%) scale(0.86) !important;
      }
      .card.show-center,
      .card.show-prev,
      .card.show-next {
        will-change: transform, opacity;
      }
      .showcase {
        position: absolute;
        inset: 0;
        z-index: 20;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.6s ease;
      }
      body[data-mode="showcase"] .showcase,
      body[data-mode="detail"] .showcase {
        opacity: 1;
      }
      .showcase-kicker,
      .showcase-name,
      .showcase-rule,
      .showcase-desc,
      .nav-arrow,
      .indicators,
      .back-gallery,
      .detail-close {
        position: absolute;
      }
      .showcase-kicker {
        top: var(--show-kicker-y, 10.5%);
        left: 50%;
        translate: -50% 0;
        font-size: var(--show-kicker-size, 2.8cqw);
        letter-spacing: 0.35em;
        text-transform: uppercase;
        white-space: nowrap;
      }
      .showcase-name {
        top: var(--show-name-y, 17%);
        left: 50%;
        translate: -50% -50%;
        font-size: var(--show-name-size, 13cqw);
        font-weight: 500;
        line-height: 0.9;
        letter-spacing: 0.025em;
        white-space: nowrap;
        text-shadow: 0 0.5cqw 1.5cqw #fff8;
      }
      .showcase-rule {
        top: var(--show-rule-y, 23%);
        left: 50%;
        translate: -50% 0;
        width: var(--rule-width, 8cqw);
        height: var(--rule-height, 0.32cqw);
        background: #0006;
      }
      .showcase-desc {
        top: var(--show-desc-y, 26.5%);
        left: 50%;
        translate: -50% 0;
        width: var(--show-desc-width, 78%);
        font-size: var(--show-desc-size, 2.95cqw);
        line-height: var(--show-desc-line, 1.45);
        text-align: center;
        color: #0009;
      }
      .showcase-kicker,
      .showcase-name,
      .showcase-rule,
      .showcase-desc {
        transition:
          opacity 0.24s ease,
          transform 0.42s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .showcase.text-hidden .showcase-kicker,
      .showcase.text-hidden .showcase-name,
      .showcase.text-hidden .showcase-rule,
      .showcase.text-hidden .showcase-desc {
        opacity: 0;
        transform: translateY(0.8cqw);
      }
      .explore-btn {
        position: absolute;
        left: 50%;
        bottom: var(--explore-bottom, 49%);
        translate: -50% 0;
        padding: var(--explore-pad, 2.4cqw 8cqw);
        font-size: var(--explore-size, 3cqw);
        letter-spacing: 0.22em;
        text-transform: uppercase;
        pointer-events: auto;
      }
      .nav-arrow {
        top: var(--nav-y, 17%);
        width: var(--nav-size, 9cqw);
        height: var(--nav-size, 9cqw);
        min-width: var(--nav-min, 34px);
        min-height: var(--nav-min, 34px);
        border: 0.2cqw solid #ffffffa6;
        border-radius: 50%;
        background: #ffffff73;
        display: grid;
        place-items: center;
        cursor: pointer;
        pointer-events: auto;
        box-shadow: 0 1.6cqw 4cqw #0002;
      }
      .nav-arrow.prev {
        left: 4%;
      }
      .nav-arrow.next {
        right: 4%;
      }
      .nav-arrow svg,
      .mini svg {
        width: 40%;
        height: 40%;
        fill: none;
        stroke: #000a;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .indicators {
        left: 50%;
        bottom: var(--dots-bottom, 10%);
        translate: -50% 0;
        display: flex;
        gap: var(--dots-gap, 1.5cqw);
        pointer-events: auto;
      }
      .dot {
        width: var(--dot-size, 1.5cqw);
        height: var(--dot-size, 1.5cqw);
        border-radius: 50%;
        background: #0003;
        cursor: pointer;
        transition: 0.25s ease;
      }
      .dot.active {
        scale: 1.3;
        background: #000b;
      }
      .back-gallery,
      .detail-close {
        top: var(--back-y, 3%);
        left: 50%;
        translate: -50% 0;
        z-index: 45;
        max-width: 72%;
        min-width: var(--back-width, 31cqw);
        min-height: var(--back-height, 8cqw);
        padding: var(--back-pad, 1.7cqw 4cqw);
        font-size: var(--back-size, 2.45cqw);
        letter-spacing: 0.22em;
        text-transform: uppercase;
        opacity: 0;
        pointer-events: none;
      }
      body[data-mode="showcase"] .back-gallery,
      body[data-mode="detail"] .detail-close {
        opacity: 1;
        pointer-events: auto;
      }
      body[data-mode="detail"] .showcase-kicker,
      body[data-mode="detail"] .showcase-name,
      body[data-mode="detail"] .showcase-rule,
      body[data-mode="detail"] .showcase-desc,
      body[data-mode="detail"] .explore-btn,
      body[data-mode="detail"] .indicators {
        opacity: 0;
        pointer-events: none;
      }
      body[data-mode="detail"] .card.show-prev,
      body[data-mode="detail"] .card.show-next {
        opacity: 0 !important;
        pointer-events: none !important;
      }
      body[data-mode="detail"] .card.show-center {
        left: var(--detail-card-x, 50%) !important;
        top: var(--detail-card-y, 72%) !important;
        width: var(--detail-card-width, 52%) !important;
        transform: var(
          --detail-card-transform,
          translate(-50%, -50%)
        ) !important;
      }
      .detail {
        position: absolute;
        top: var(--detail-y, 11%);
        left: var(--detail-x, 50%);
        z-index: 22;
        width: var(--detail-width, 82%);
        translate: var(--detail-translate, -50% 0);
        opacity: 0;
        pointer-events: none;
        text-align: var(--detail-align, center);
        transition: opacity 0.6s ease;
      }
      body[data-mode="detail"] .detail {
        opacity: 1;
        pointer-events: auto;
      }
      .detail-kicker {
        margin-bottom: var(--detail-kicker-margin, 2.5cqw);
        font-size: var(--detail-kicker-size, 2.75cqw);
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: #0008;
      }
      .detail-name {
        font-size: var(--detail-name-size, 13cqw);
        font-weight: 400;
        line-height: 0.9;
        letter-spacing: 0.01em;
        text-shadow: 0 0.5cqw 1.5cqw #fff8;
      }
      .detail-rule {
        width: var(--detail-rule-width, 8cqw);
        height: var(--detail-rule-height, 0.32cqw);
        margin: var(--detail-rule-margin, 3cqw auto);
        background: #0007;
      }
      .detail-desc {
        max-width: var(--detail-desc-width, 74cqw);
        margin: var(--detail-desc-margin, 0 auto 4cqw);
        font-size: var(--detail-desc-size, 3.05cqw);
        line-height: 1.5;
        color: #0009;
      }
      .detail-actions {
        display: flex;
        align-items: center;
        justify-content: var(--actions-align, center);
        gap: var(--actions-gap, 2.3cqw);
      }
      .learn {
        padding: var(--learn-pad, 2.4cqw 6.2cqw);
        font-size: var(--learn-size, 2.8cqw);
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }
      .mini {
        width: var(--mini-size, 8.5cqw);
        height: var(--mini-size, 8.5cqw);
        border: var(--mini-border, 0.18cqw) solid #ffffff8c;
        border-radius: 50%;
        background: #ffffff73;
        display: grid;
        place-items: center;
        cursor: pointer;
      }
      .next-hint {
        position: absolute;
        left: var(--hint-x, 50%);
        bottom: var(--next-hint-bottom, 4%);
        z-index: 12;
        translate: var(--next-hint-translate, -50% 0);
        font-size: var(--next-hint-size, 2.15cqw);
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: #0007;
        opacity: 0;
        pointer-events: none;
      }
      body[data-mode="detail"] .next-hint {
        opacity: 1;
      }
      .menu-toggle {
        position: absolute;
        top: var(--menu-y, 2.6%);
        left: 4%;
        z-index: 40;
        width: var(--menu-size, 40px);
        height: var(--menu-size, 40px);
        padding: var(--menu-pad, 9px);
        border: 0.15cqw solid #ffffff40;
        border-radius: 50%;
        background: #ffffff1f;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 4px;
        cursor: pointer;
      }
      .menu-toggle span {
        display: block;
        width: 100%;
        height: 2px;
        border-radius: 99px;
        background: #ffffffe6;
      }
      .sound {
        position: fixed;
        top: max(10px, env(safe-area-inset-top));
        right: max(12px, env(safe-area-inset-right));
        z-index: 30;
        width: 42px;
        height: 42px;
        padding: 0;
        border: 0;
        background: transparent;
        cursor: pointer;
      }
      .sound svg {
        width: 100%;
        height: 100%;
        overflow: visible;
        filter: drop-shadow(0 0 1.2cqw #ff78dc2e);
      }
      .wave {
        fill: none;
        stroke: url(#waveGradient);
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        transform-origin: center;
      }
      .sound.paused .wave {
        opacity: 0.3;
      }
      .sound.playing .w1 {
        animation: w1 1.4s ease-in-out infinite;
      }
      .sound.playing .w2 {
        animation: w2 1.9s ease-in-out infinite reverse;
      }
      .sound.playing .w3 {
        animation: w3 2.5s ease-in-out infinite;
      }
      .sound.playing .w4 {
        animation: w4 3.1s ease-in-out infinite reverse;
      }
      @keyframes w1 {
        50% {
          transform: scale(0.96) rotate(8deg);
        }
      }
      @keyframes w2 {
        50% {
          transform: scale(1.08) rotate(-7deg);
        }
      }
      @keyframes w3 {
        50% {
          transform: scale(1.2) rotate(6deg);
        }
      }
      @keyframes w4 {
        50% {
          transform: scale(1.34) rotate(-5deg);
        }
      }
      .panel {
        position: absolute;
        inset: 0 auto 0 0;
        z-index: 50;
        width: var(--panel-width, 88%);
        padding: var(--panel-pad, 8cqw 5cqw 5cqw);
        overflow-y: auto;
        border-right: 0.18cqw solid #ffffff59;
        border-radius: var(--panel-radius, 0 3.2cqw 3.2cqw 0);
        background: linear-gradient(#f7fafff2, #e6edffed);
        box-shadow: 3cqw 0 8cqw #0002;
        translate: -100% 0;
        opacity: 0;
        pointer-events: none;
        transition: 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .panel.show {
        translate: 0;
        opacity: 1;
        pointer-events: auto;
      }
      .panel-header {
        position: relative;
        margin-bottom: var(--panel-head-margin, 5cqw);
        padding-right: 10cqw;
      }
      .panel-kicker,
      .field label,
      .saved-kicker,
      .menu-title {
        font-size: var(--panel-label-size, 2.45cqw);
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #0007;
      }
      .panel-title {
        font-size: var(--panel-title-size, 7cqw);
        font-weight: 500;
        line-height: 1.05;
      }
      .panel-close {
        position: absolute;
        top: 0;
        right: 0;
        width: var(--panel-close-size, 8cqw);
        height: var(--panel-close-size, 8cqw);
        border: 0;
        border-radius: 50%;
        background: #ffffff4d;
        font-size: var(--panel-close-font, 4cqw);
        cursor: pointer;
      }
      .screen.hidden {
        display: none;
      }
      .menu-title {
        margin-bottom: 3cqw;
      }
      .menu-item,
      .back-link,
      .save-note {
        cursor: pointer;
      }
      .menu-item {
        width: 100%;
        margin-bottom: var(--menu-item-margin, 2.2cqw);
        padding: var(--menu-item-pad, 3.2cqw);
        border: 0.18cqw solid #ffffff4d;
        border-radius: var(--field-radius, 2.4cqw);
        background: #ffffff38;
        text-align: left;
        font-size: var(--menu-font, 3.3cqw);
      }
      .back-link {
        margin-bottom: 3cqw;
        border: 0;
        background: transparent;
        font-size: var(--menu-font, 3.3cqw);
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: var(--field-gap, 1.6cqw);
        margin-bottom: var(--field-margin, 2.6cqw);
      }
      .field input,
      .field textarea {
        width: 100%;
        padding: var(--field-pad, 3.2cqw);
        border: 0.18cqw solid #ffffff59;
        border-radius: var(--field-radius, 2.4cqw);
        outline: 0;
        background: #ffffff42;
        font-size: 16px;
        color: #000b;
      }
      .field textarea {
        min-height: var(--textarea-height, 25cqw);
        resize: none;
      }
      .save-note {
        padding: 2.4cqw 4.4cqw;
        border: 0.18cqw solid #ffffff4d;
        border-radius: 99px;
        background: #ffffff38;
        font-size: var(--menu-font, 3.3cqw);
      }
      .saved {
        margin-top: 4cqw;
        padding-top: 3cqw;
        border-top: 0.18cqw solid #ffffff4d;
      }
      .saved-kicker {
        margin-bottom: 2cqw;
      }
      .saved-list {
        display: flex;
        flex-direction: column;
        gap: 2cqw;

    <script>
      const $ = (s) => document.querySelector(s),
        $$ = (s) => [...document.querySelectorAll(s)],
        body = document.body;
      // prettier-ignore
      $("#sound").innerHTML=`<svg viewBox="0 0 120 120" aria-hidden="true"><defs><linearGradient id="waveGradient" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#fde68a"/><stop offset=".55" stop-color="#f472b6"/><stop offset="1" stop-color="#a78bfa"/></linearGradient></defs><path id="waveShape" d="M60 18C74 18 84 24 91 34c8 11 11 22 10 34-1 14-8 26-20 33-12 7-27 8-39 3-12-5-21-15-24-28-3-13-1-27 6-38 7-11 20-19 36-20Z" fill="none"/><use href="#waveShape" class="wave w1"/><use href="#waveShape" class="wave w2" opacity=".8"/><use href="#waveShape" class="wave w3" opacity=".55"/><use href="#waveShape" class="wave w4" opacity=".35"/></svg>`;
      // prettier-ignore
      const stones=[
      ["Garnet_view.html","GARNET","January","Trust · Protection","A deep crimson stone of devotion and steady courage. Garnet is said to ignite passion and guard the heart of those who carry it.","./가넷2.jpg","Garnet"],
      ["Amethyst_view.html","AMETHYST","February","Clarity · Calm","A violet hush in stone. Amethyst is the keeper of clear thoughts, soft sleep, and the quiet kind of wisdom that grows in stillness.","./자수정2.jpg","Amethyst"],
      ["Aquamarine_view.html","AQUAMARINE","March","Serenity · Courage","The color of morning sea light. Aquamarine carries calm across long journeys and reminds the heart that depth and softness can live together.","./아쿠아마린2.jpg","Aquamarine"],
      ["Diamond_view.html","DIAMOND","April","Eternity · Light","Born of pressure and time. The diamond gathers every small light and gives it back, a quiet promise of things that do not break.","./다이아몬드2.jpg","Diamond"],
      ["Emerald_view.html","EMERALD","May","Hope · Renewal","A green so deep it remembers spring. Emerald is the stone of fresh beginnings and a love that grows back after every winter.","./에메랄드2.jpg","Emerald"],
      ["Pearl_view.html","PEARL","June","Innocence · Grace","The only gem made by a living thing. Pearl is patience turned luminous — a soft, slow answer to the world.","./진주2.jpg","Pearl"],
      ["Ruby_view.html","RUBY","July","Passion · Vitality","A heart caught in stone. Ruby gives back warmth on the coldest days, a quiet flame that refuses to be put out.","./루비2.jpg","Ruby"],
      ["Peridot_view_light.html","PERIDOT","August","Light · Healing","A small piece of summer afternoon. Peridot lifts the spirit and softens the edges of a long, bright day.","./페리도트2.jpg","Peridot"],
      ["Sapphire_view.html","SAPPHIRE","September","Wisdom · Loyalty","The color of a quiet sky after rain. Sapphire holds promises and the kind of love that learns the long shape of a life.","./사파이어2.jpg","Sapphire"],
      ["Opal_view.html","OPAL","October","Imagination · Wonder","A stone that holds many lights at once. Opal is the soft proof that a single heart can carry a whole sky of color.","./화이트오팔2.jpg","Opal"],
      ["Topaz_view.html","TOPAZ","November","Warmth · Friendship","Honey caught in glass. Topaz is the stone of close friendships and the quiet courage to speak the truth gently.","./토파즈2.jpg","Topaz"],
      ["Turquoise_view.html","TURQUOISE","December","Protection · Peace","Sky and earth, held in the same breath. Turquoise has been worn for thousands of years as a small piece of safe sky to carry close.","./터키석2.jpg","Turquoise"]
    ];
      const fan = [
        [0, 28, -10, -10, 46, -8],
        [15.6, 25, -7, 0, 26, -25],
        [31.2, 27, -3, 9, 42, -10],
        [46.8, 25, 3, 18, 22, 0],
        [62.4, 27, 7, 27, 44, -5],
        [78, 29, 10, 36, 33, 0],
        [0, 51, -9, 47, 27, 0],
        [15.6, 48, -6, 56, 44, 5],
        [31.2, 50, -2, 65, 22, 0],
        [46.8, 48, 3, 74, 42, 10],
        [62.4, 50, 6, 83, 26, 25],
        [78, 52, 9, 90, 46, 8],
      ];
      const cardsBox = $("#cards");
      cardsBox.innerHTML = stones
        .map(
          (s, i) =>
            `<article class="card" style="--x:${fan[i][0]}%;--y:${fan[i][1]}%;--r:${fan[i][2]}deg;--lx:${fan[i][3]}%;--ly:${fan[i][4]}%;--lr:${fan[i][5]}deg" data-i="${i}"><img class="card-img" src="${s[5]}" alt="${s[6]}" decoding="async"><div class="card-text">${s[6]}<br>${s[2]}</div></article>`,
        )
        .join("");
      const cards = $$(".card"),
        ids = [
          "showKicker",
          "showName",
          "showDesc",
          "detailKicker",
          "detailName",
          "detailDesc",
          "nextHint",
        ].reduce((o, id) => ((o[id] = $("#" + id)), o), {});
      const showcase = $(".showcase");
      let current = 0,
        animating = false,
        playing = false,
        textTimer;
      const sounds = {
        bgm: $("#bgm"),
        hover: $("#hoverSfx"),
        open: $("#openSfx"),
        close: $("#closeSfx"),
      };
      const play = (audio, volume) => {
        audio.currentTime = 0;
        audio.volume = volume;
        audio.play().catch(() => {});
      };
      const setSound = (on) => {
        $("#sound").classList.toggle("playing", on);
        $("#sound").classList.toggle("paused", !on);
      };
      document.addEventListener(
        "click",
        () => {
          if (!playing) {
            sounds.bgm.volume = 0.15;
            sounds.bgm.play().catch(() => {});
            playing = true;
            setSound(true);
          }
        },
        { once: true },
      );
      $("#sound").onclick = (e) => {
        e.stopPropagation();
        playing = sounds.bgm.paused;
        if (playing) sounds.bgm.play().catch(() => {});
        else sounds.bgm.pause();
        setSound(playing);
      };
      const update = (index, instant = false) => {
        const total = cards.length,
          prev = (index - 1 + total) % total,
          next = (index + 1) % total;
        cards.forEach((card, i) => {
          card.className = "card";
          card.style.removeProperty("left");
          card.style.removeProperty("top");
          card.style.removeProperty("width");
          card.style.removeProperty("opacity");
          card.style.removeProperty("z-index");
          card.style.removeProperty("transform");
          if (i === index) card.classList.add("show-center");
          else if (i === prev) card.classList.add("show-prev");
          else if (i === next) card.classList.add("show-next");
          else card.classList.add("show-far");
        });
        const s = stones[index],
          n = stones[next];
        ids.showKicker.textContent =
          ids.detailKicker.textContent = `${s[2].toUpperCase()} BIRTHSTONE`;
        ids.showName.textContent = ids.detailName.textContent = s[1];
        ids.showDesc.textContent = ids.detailDesc.textContent = s[4];
        ids.nextHint.textContent = `NEXT · ${n[1]}`;
        $$(".dot").forEach((dot, i) =>
          dot.classList.toggle("active", i === index),
        );
      };
      const revealText = () => {
        requestAnimationFrame(() =>
          requestAnimationFrame(() => showcase.classList.remove("text-hidden")),
        );
      };
      const go = (dir) => {
        if (animating || !["showcase", "detail"].includes(body.dataset.mode))
          return;
        animating = true;
        clearTimeout(textTimer);
        showcase.classList.add("text-hidden");
        const nextIndex = (current + dir + cards.length) % cards.length;
        play(sounds.hover, 0.35);
        textTimer = setTimeout(() => {
          current = nextIndex;
          update(current);
          revealText();
        }, 140);
        setTimeout(() => (animating = false), 680);
      };
      $("#startBtn").onclick = () => {
        if (animating) return;
        animating = true;
        play(sounds.open, 0.45);
        $("#startCta").style.opacity = 0;
        $("#bigTitle").style.opacity = 0;
        $("#centerCopy").style.opacity = 0;
        cards.forEach((card, i) => {
          card.style.setProperty("--gather-rot", `${(i - 5.5) * 1.6}deg`);
          card.style.zIndex = 3 + i;
        });
        showcase.classList.add("text-hidden");
        requestAnimationFrame(() => (body.dataset.mode = "gathering"));
        setTimeout(() => {
          body.dataset.mode = "showcase";
          current = 0;
          update(0, true);
          revealText();
          animating = false;
        }, 760);
      };
      $("#indicators").innerHTML = stones
        .map(
          (_, i) =>
            `<span class="dot${i ? "" : " active"}" data-i="${i}"></span>`,
        )
        .join("");
      $("#indicators").onclick = (e) => {
        const dot = e.target.closest(".dot");
        if (!dot || body.dataset.mode !== "showcase" || animating) return;
        clearTimeout(textTimer);
        showcase.classList.add("text-hidden");
        const nextIndex = +dot.dataset.i;
        play(sounds.hover, 0.35);
        textTimer = setTimeout(() => {
          current = nextIndex;
          update(current);
          revealText();
        }, 140);
      };
      $("#prev").onclick = $("#miniPrev").onclick = () => go(-1);
      $("#next").onclick = $("#miniNext").onclick = () => go(1);
      cardsBox.onclick = (e) => {
        const card = e.target.closest(".card");
        if (!card || animating) return;
        if (body.dataset.mode === "showcase") {
          if (card.classList.contains("show-prev")) go(-1);
          else if (card.classList.contains("show-next")) go(1);
          else if (card.classList.contains("show-center")) openDetail();
        } else if (
          body.dataset.mode === "detail" &&
          card.classList.contains("show-center")
        )
          navigate();
      };
      const openDetail = () => {
        if (animating) return;
        animating = true;
        play(sounds.open, 0.45);
        body.dataset.mode = "detail";
        setTimeout(() => (animating = false), 480);
      };
      const closeDetail = () => {
        if (animating) return;
        animating = true;
        play(sounds.close, 1);
        body.dataset.mode = "showcase";
        setTimeout(() => (animating = false), 480);
      };
      $("#explore").onclick = openDetail;
      $("#detailClose").onclick = closeDetail;
      const navigate = () => {
        const link = stones[current][0];
        if (!link) return;
        $("#transition").classList.add("show");
        play(sounds.open, 0.45);
        setTimeout(() => (location.href = link), 800);
      };
      $("#learn").onclick = navigate;
      $("#backGallery").onclick = () => {
        if (animating) return;
        animating = true;
        play(sounds.close, 1);
        cards.forEach((card, i) => {
          card.className = "card";
          card.style.setProperty("--gather-rot", `${(i - 5.5) * 2}deg`);
          card.style.opacity = 1;
          card.style.zIndex = 20 + i;
        });
        body.dataset.mode = "returning";
        setTimeout(() => {
          body.dataset.mode = "fan";
          cards.forEach((card) => {
            ["left", "top", "width", "opacity", "z-index", "transform"].forEach(
              (p) => card.style.removeProperty(p),
            );
          });
          Object.assign($("#startCta").style, { display: "flex", opacity: 1 });
          $("#bigTitle").style.opacity = "";
          $("#centerCopy").style.opacity = "";
          animating = false;
        }, 620);
      };
      document.onkeydown = (e) => {
        if (e.key === "ArrowLeft") go(-1);
        if (e.key === "ArrowRight") go(1);
        if (e.key === "Escape") {
          if (body.dataset.mode === "detail") closeDetail();
          else if (body.dataset.mode === "showcase") $("#backGallery").click();
        }
      };
      $("#bigTitle").ondblclick = () => {
        $("#transition").classList.add("show");
        setTimeout(() => (location.href = "The Star I Am.html"), 700);
      };
      const panel = $("#panel"),
        menu = $("#menuScreen"),
        notes = $("#notesScreen");
      $("#menuToggle").onclick = () => panel.classList.toggle("show");
      $("#panelClose").onclick = () => panel.classList.remove("show");
      panel.onclick = (e) => {
        const go = e.target.closest("[data-go]");
        if (go) location.href = go.dataset.go;
      };
      $("#openNotes").onclick = () => {
        menu.classList.add("hidden");
        notes.classList.remove("hidden");
      };
      $("#backMenu").onclick = () => {
        notes.classList.add("hidden");
        menu.classList.remove("hidden");
      };
      const key = "birthstoneNotes",
        fields = [$("#stoneName"), $("#stoneMeaning"), $("#stoneMemo")],
        loadNotes = () => {
          try {
            return JSON.parse(localStorage.getItem(key)) || [];
          } catch {
            return [];
          }
        },
        saveNotes = (n) => localStorage.setItem(key, JSON.stringify(n)),
        esc = (s) =>
          String(s || "-").replace(
            /[&<>"']/g,
            (c) =>
              ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#39;",
              })[c],
          );
      const renderNotes = () => {
        const list = loadNotes();
        $("#savedList").innerHTML = list.length
          ? list
              .map(
                (n, i) =>
                  `<article class="saved-item"><div class="saved-stone">${esc(n.name)}</div><div class="saved-meaning">${esc(n.meaning)}</div><div class="saved-memo">${esc(n.memo)}</div><button class="delete-note" data-delete="${i}">Delete</button></article>`,
              )
              .join("")
          : '<div class="empty">Nothing saved yet.</div>';
      };
      $("#saveNote").onclick = () => {
        const [name, meaning, memo] = fields.map((f) => f.value.trim());
        if (!name && !meaning && !memo) return;
        const list = loadNotes();
        list.unshift({ name, meaning, memo });
        saveNotes(list);
        fields.forEach((f) => (f.value = ""));
        renderNotes();
      };
      $("#savedList").onclick = (e) => {
        const b = e.target.closest("[data-delete]");
        if (!b) return;
        const list = loadNotes();
        list.splice(+b.dataset.delete, 1);
        saveNotes(list);
        renderNotes();
      };
      renderNotes();
    </script>
  </body>
</html>
